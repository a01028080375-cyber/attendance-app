<body>
<div id="root"></div>
<script type="text/babel-app">
const { useState, useEffect, useCallback } = React;

/* ---------- inline icons (no external dependency) ---------- */
const ICON_PATHS = {
  Clock: <><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></>,
  CalendarDays: <><rect x="3" y="4" width="18" height="18" rx="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></>,
  ListTodo: <><rect x="3" y="5" width="6" height="6" rx="1" /><path d="m3 17 2 2 4-4" /><path d="M13 6h8" /><path d="M13 12h8" /><path d="M13 18h8" /></>,
  Settings: <><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z" /></>,
  LogIn: <><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" /><polyline points="10 17 15 12 10 7" /><line x1="15" y1="12" x2="3" y2="12" /></>,
  LogOut: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></>,
  AlertCircle: <><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></>,
  CheckCircle2: <><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></>,
  Plus: <><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></>,
  Trash2: <><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></>,
  ChevronLeft: <polyline points="15 18 9 12 15 6" />,
  ChevronRight: <polyline points="9 18 15 12 9 6" />,
  UserPlus: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><line x1="19" y1="8" x2="19" y2="14" /><line x1="22" y1="11" x2="16" y2="11" /></>,
  X: <><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>,
};

function Icon({ name, className }) {
  return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
      strokeLinecap="round" strokeLinejoin="round" className={className || "w-4 h-4"}>
      {ICON_PATHS[name]}
    </svg>
  );
}

/* ---------- helpers ---------- */
const WORKSTART_KEY = "awms:workStart";

const initialData = {
  settings: { workStart: window.localStorage.getItem(WORKSTART_KEY) || "09:00", members: [] },
  attendance: {}, // key: `${member}|${YYYY-MM-DD}` -> { clockIn, clockOut }
  tasks: [],
};

const hmFromDb = (t) => (t ? t.slice(0, 5) : null);

async function fetchAllData() {
  const [{ data: members, error: e1 }, { data: logs, error: e2 }, { data: tasks, error: e3 }] = await Promise.all([
    window.sb.from("attendance_members").select("name").order("created_at"),
    window.sb.from("attendance_log").select("member,date,clock_in,clock_out"),
    window.sb.from("attendance_tasks").select("id,title,assignee,due,priority,status").order("created_at", { ascending: false }),
  ]);
  if (e1 || e2 || e3) {
    console.error("불러오기 실패", e1 || e2 || e3);
  }
  const attendance = {};
  (logs || []).forEach((r) => {
    attendance[`${r.member}|${r.date}`] = { clockIn: hmFromDb(r.clock_in), clockOut: hmFromDb(r.clock_out) };
  });
  return {
    members: (members || []).map((m) => m.name),
    attendance,
    tasks: tasks || [],
  };
}

const pad = (n) => String(n).padStart(2, "0");
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
};
const nowHM = () => {
  const d = new Date();
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
};
const toMin = (hm) => {
  if (!hm) return null;
  const [h, m] = hm.split(":").map(Number);
  return h * 60 + m;
};
const minToHrs = (min) => {
  if (min == null || min < 0) return "-";
  const h = Math.floor(min / 60);
  const m = min % 60;
  return `${h}시간 ${pad(m)}분`;
};
const fmtDate = (s) => {
  const [y, m, d] = s.split("-");
  const w = ["일", "월", "화", "수", "목", "금", "토"][new Date(s).getDay()];
  return `${Number(m)}/${Number(d)} (${w})`;
};
const monthPrefix = (s) => s.slice(0, 7);

const STATUSES = [
  { id: "todo", label: "예정", ring: "ring-slate-300", bg: "bg-slate-100", text: "text-slate-600", dot: "bg-slate-400" },
  { id: "doing", label: "진행중", ring: "ring-sky-300", bg: "bg-sky-100", text: "text-sky-700", dot: "bg-sky-500" },
  { id: "done", label: "완료", ring: "ring-emerald-300", bg: "bg-emerald-100", text: "text-emerald-700", dot: "bg-emerald-500" },
];
const PRIORITIES = [
  { id: "low", label: "낮음", dot: "bg-slate-400" },
  { id: "mid", label: "보통", dot: "bg-sky-500" },
  { id: "high", label: "높음", dot: "bg-amber-500" },
  { id: "urgent", label: "긴급", dot: "bg-rose-500" },
];

function AttendanceTaskApp() {
  const [data, setData] = useState(initialData);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("attendance");
  const [member, setMember] = useState("");
  const [now, setNow] = useState(nowHM());

  useEffect(() => {
    const t = setInterval(() => setNow(nowHM()), 1000 * 20);
    return () => clearInterval(t);
  }, []);

  const reload = useCallback(async () => {
    const { members, attendance, tasks } = await fetchAllData();
    setData((prev) => ({ ...prev, settings: { ...prev.settings, members }, attendance, tasks }));
    setMember((prev) => (prev && members.includes(prev) ? prev : members[0] || ""));
  }, []);

  useEffect(() => {
    (async () => {
      try {
        await reload();
      } catch (e) {
        console.error("불러오기 실패", e);
      } finally {
        setLoading(false);
      }
    })();

    const channel = window.sb
      .channel("attendance-app-changes")
      .on("postgres_changes", { event: "*", schema: "public", table: "attendance_members" }, reload)
      .on("postgres_changes", { event: "*", schema: "public", table: "attendance_log" }, reload)
      .on("postgres_changes", { event: "*", schema: "public", table: "attendance_tasks" }, reload)
      .subscribe();
    return () => window.sb.removeChannel(channel);
  }, [reload]);

  const setWorkStart = useCallback((v) => {
    window.localStorage.setItem(WORKSTART_KEY, v);
    setData((prev) => ({ ...prev, settings: { ...prev.settings, workStart: v } }));
  }, []);

  const addMember = useCallback(async (name) => {
    const { error } = await window.sb.from("attendance_members").insert({ name });
    if (error) { console.error("구성원 추가 실패", error); return; }
    await reload();
  }, [reload]);

  const removeMember = useCallback(async (name) => {
    const { error } = await window.sb.from("attendance_members").delete().eq("name", name);
    if (error) { console.error("구성원 삭제 실패", error); return; }
    await reload();
  }, [reload]);

  const setAttendance = useCallback(async (m, date, patch) => {
    const row = { member: m, date };
    if (patch.clockIn !== undefined) row.clock_in = patch.clockIn;
    if (patch.clockOut !== undefined) row.clock_out = patch.clockOut;
    const { error } = await window.sb.from("attendance_log").upsert(row, { onConflict: "member,date" });
    if (error) { console.error("출퇴근 기록 실패", error); return; }
    await reload();
  }, [reload]);

  const addTask = useCallback(async (task) => {
    const { error } = await window.sb.from("attendance_tasks").insert(task);
    if (error) { console.error("업무 추가 실패", error); return; }
    await reload();
  }, [reload]);

  const updateTask = useCallback(async (id, patch) => {
    const { error } = await window.sb.from("attendance_tasks").update(patch).eq("id", id);
    if (error) { console.error("업무 수정 실패", error); return; }
    await reload();
  }, [reload]);

  const removeTask = useCallback(async (id) => {
    const { error } = await window.sb.from("attendance_tasks").delete().eq("id", id);
    if (error) { console.error("업무 삭제 실패", error); return; }
    await reload();
  }, [reload]);

  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-slate-50 text-slate-400">
        <Icon name="Clock" className="w-5 h-5 mr-2 animate-pulse" /> 불러오는 중…
      </div>
    );
  }

  const tabs = [
    { id: "attendance", label: "출퇴근", icon: "CalendarDays" },
    { id: "tasks", label: "업무", icon: "ListTodo" },
    { id: "settings", label: "설정", icon: "Settings" },
  ];

  return (
    <div className="min-h-screen bg-slate-50 text-slate-800 font-sans">
      <header className="bg-white border-b border-slate-200">
        <div className="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <div className="w-9 h-9 rounded-lg bg-teal-600 flex items-center justify-center text-white">
              <Icon name="Clock" className="w-5 h-5" />
            </div>
            <div>
              <h1 className="text-lg font-bold tracking-tight leading-none">출퇴근 · 업무 관리</h1>
              <p className="text-xs text-slate-400 mt-0.5">{fmtDate(todayStr())} · 현재 {now}</p>
            </div>
          </div>
          <span className="text-xs text-slate-400 hidden sm:block">프로토타입</span>
        </div>
        <nav className="max-w-4xl mx-auto px-4 flex gap-1">
          {tabs.map((t) => {
            const active = tab === t.id;
            return (
              <button
                key={t.id}
                onClick={() => setTab(t.id)}
                className={`flex items-center gap-1.5 px-3 py-2.5 text-sm font-medium border-b-2 transition-colors ${
                  active ? "border-teal-600 text-teal-700" : "border-transparent text-slate-500 hover:text-slate-700"
                }`}
              >
                <Icon name={t.icon} className="w-4 h-4" /> {t.label}
              </button>
            );
          })}
        </nav>
      </header>

      <main className="max-w-4xl mx-auto px-4 py-6">
        {tab === "attendance" && (
          <AttendanceView data={data} setAttendance={setAttendance} member={member} setMember={setMember} />
        )}
        {tab === "tasks" && <TaskBoard data={data} addTask={addTask} updateTask={updateTask} removeTask={removeTask} />}
        {tab === "settings" && (
          <SettingsView
            data={data}
            setWorkStart={setWorkStart}
            addMember={addMember}
            removeMember={removeMember}
            setMember={setMember}
          />
        )}
      </main>
    </div>
  );
}

/* ---------- 출퇴근 ---------- */
function AttendanceView({ data, setAttendance, member, setMember }) {
  const { members, workStart } = data.settings;
  const key = `${member}|${todayStr()}`;
  const today = data.attendance[key] || {};

  const setToday = (patch) => {
    if (!member) return;
    setAttendance(member, todayStr(), patch);
  };
  const isLate = today.clockIn && toMin(today.clockIn) > toMin(workStart);

  if (!member) {
    return (
      <div className="bg-white rounded-xl border border-slate-200 p-8 text-center text-sm text-slate-400">
        먼저 설정 탭에서 구성원을 추가하세요.
      </div>
    );
  }

  const mp = monthPrefix(todayStr());
  const rows = Object.entries(data.attendance)
    .filter(([k]) => k.startsWith(`${member}|${mp}`))
    .map(([k, v]) => ({ date: k.split("|")[1], ...v }))
    .sort((a, b) => b.date.localeCompare(a.date));

  const workdays = rows.filter((r) => r.clockIn).length;
  const lateDays = rows.filter((r) => r.clockIn && toMin(r.clockIn) > toMin(workStart)).length;
  const totalMin = rows.reduce((s, r) => {
    if (r.clockIn && r.clockOut) return s + (toMin(r.clockOut) - toMin(r.clockIn));
    return s;
  }, 0);

  return (
    <div className="space-y-6">
      {members.length > 1 && (
        <div className="flex flex-wrap gap-2">
          {members.map((m) => (
            <button
              key={m}
              onClick={() => setMember(m)}
              className={`px-3 py-1.5 rounded-full text-sm border transition-colors ${
                member === m ? "bg-teal-600 text-white border-teal-600" : "bg-white text-slate-600 border-slate-200 hover:border-slate-300"
              }`}
            >
              {m}
            </button>
          ))}
        </div>
      )}

      <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
        <div className="flex items-center justify-between mb-4">
          <div>
            <p className="text-sm text-slate-400">{member}님의 오늘</p>
            <p className="text-base font-semibold">{fmtDate(todayStr())}</p>
          </div>
          {today.clockIn && (
            <span className={`inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium ${
              isLate ? "bg-amber-100 text-amber-700" : "bg-emerald-100 text-emerald-700"
            }`}>
              <Icon name={isLate ? "AlertCircle" : "CheckCircle2"} className="w-3.5 h-3.5" />
              {isLate ? "지각" : "정상 출근"}
            </span>
          )}
        </div>

        <div className="grid grid-cols-2 gap-3">
          <div className="rounded-lg bg-slate-50 p-3 text-center">
            <p className="text-xs text-slate-400 mb-1">출근</p>
            <p className="text-2xl font-bold tabular-nums">{today.clockIn || "--:--"}</p>
          </div>
          <div className="rounded-lg bg-slate-50 p-3 text-center">
            <p className="text-xs text-slate-400 mb-1">퇴근</p>
            <p className="text-2xl font-bold tabular-nums">{today.clockOut || "--:--"}</p>
          </div>
        </div>

        <div className="grid grid-cols-2 gap-3 mt-3">
          <button
            onClick={() => setToday({ clockIn: nowHM() })}
            disabled={!!today.clockIn}
            className="flex items-center justify-center gap-2 py-3 rounded-lg bg-teal-600 text-white font-medium hover:bg-teal-700 disabled:bg-slate-200 disabled:text-slate-400 transition-colors"
          >
            <Icon name="LogIn" className="w-4 h-4" /> 출근하기
          </button>
          <button
            onClick={() => setToday({ clockOut: nowHM() })}
            disabled={!today.clockIn || !!today.clockOut}
            className="flex items-center justify-center gap-2 py-3 rounded-lg bg-slate-800 text-white font-medium hover:bg-slate-900 disabled:bg-slate-200 disabled:text-slate-400 transition-colors"
          >
            <Icon name="LogOut" className="w-4 h-4" /> 퇴근하기
          </button>
        </div>
        <p className="text-xs text-slate-400 mt-3">기준 출근 시간 {workStart} 이후 출근 시 자동으로 지각 처리됩니다. (설정에서 변경)</p>
      </div>

      <div className="grid grid-cols-3 gap-3">
        <Stat label="근무일" value={`${workdays}일`} />
        <Stat label="지각" value={`${lateDays}회`} accent={lateDays > 0 ? "text-amber-600" : ""} />
        <Stat label="총 근무" value={minToHrs(totalMin)} />
      </div>

      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
        <div className="px-4 py-3 border-b border-slate-100 text-sm font-semibold text-slate-600">
          {Number(mp.split("-")[1])}월 근태 기록
        </div>
        {rows.length === 0 ? (
          <p className="px-4 py-8 text-center text-sm text-slate-400">아직 기록이 없어요. 출근하기를 눌러 시작하세요.</p>
        ) : (
          <table className="w-full text-sm">
            <thead>
              <tr className="text-slate-400 text-xs">
                <th className="text-left font-medium px-4 py-2">날짜</th>
                <th className="text-left font-medium px-4 py-2">출근</th>
                <th className="text-left font-medium px-4 py-2">퇴근</th>
                <th className="text-left font-medium px-4 py-2">근무</th>
                <th className="text-left font-medium px-4 py-2">상태</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r) => {
                const late = r.clockIn && toMin(r.clockIn) > toMin(workStart);
                const wm = r.clockIn && r.clockOut ? toMin(r.clockOut) - toMin(r.clockIn) : null;
                return (
                  <tr key={r.date} className="border-t border-slate-50">
                    <td className="px-4 py-2.5">{fmtDate(r.date)}</td>
                    <td className="px-4 py-2.5 tabular-nums">{r.clockIn || "-"}</td>
                    <td className="px-4 py-2.5 tabular-nums">{r.clockOut || "-"}</td>
                    <td className="px-4 py-2.5 text-slate-500">{minToHrs(wm)}</td>
                    <td className="px-4 py-2.5">
                      <span className={`text-xs px-2 py-0.5 rounded-full ${late ? "bg-amber-100 text-amber-700" : "bg-emerald-100 text-emerald-700"}`}>
                        {late ? "지각" : "정상"}
                      </span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

function Stat({ label, value, accent = "" }) {
  return (
    <div className="bg-white rounded-xl border border-slate-200 p-4 text-center shadow-sm">
      <p className="text-xs text-slate-400 mb-1">{label}</p>
      <p className={`text-lg font-bold ${accent}`}>{value}</p>
    </div>
  );
}

/* ---------- 업무 ---------- */
function TaskBoard({ data, addTask: addTaskDb, updateTask, removeTask }) {
  const { members } = data.settings;
  const [title, setTitle] = useState("");
  const [assignee, setAssignee] = useState(members[0] || "");
  const [due, setDue] = useState("");
  const [priority, setPriority] = useState("mid");

  useEffect(() => {
    if (!assignee && members[0]) setAssignee(members[0]);
  }, [members, assignee]);

  const addTask = () => {
    if (!title.trim() || !assignee) return;
    addTaskDb({ title: title.trim(), assignee, due: due || null, priority, status: "todo" });
    setTitle(""); setDue("");
  };

  const moveStatus = (t, dir) => {
    const order = ["todo", "doing", "done"];
    const i = order.indexOf(t.status);
    const ni = Math.min(order.length - 1, Math.max(0, i + dir));
    updateTask(t.id, { status: order[ni] });
  };

  return (
    <div className="space-y-5">
      <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
        <div className="flex flex-col sm:flex-row gap-2">
          <input
            value={title}
            onChange={(e) => setTitle(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && addTask()}
            placeholder="업무명을 입력하세요"
            className="flex-1 px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
          />
          <button
            onClick={addTask}
            className="flex items-center justify-center gap-1.5 px-4 py-2 rounded-lg bg-teal-600 text-white text-sm font-medium hover:bg-teal-700"
          >
            <Icon name="Plus" className="w-4 h-4" /> 추가
          </button>
        </div>
        <div className="flex flex-wrap gap-2 mt-2">
          <select value={assignee} onChange={(e) => setAssignee(e.target.value)}
            className="px-2.5 py-1.5 rounded-lg border border-slate-200 text-sm text-slate-600">
            {members.map((m) => <option key={m} value={m}>{m}</option>)}
          </select>
          <input type="date" value={due} onChange={(e) => setDue(e.target.value)}
            className="px-2.5 py-1.5 rounded-lg border border-slate-200 text-sm text-slate-600" />
          <select value={priority} onChange={(e) => setPriority(e.target.value)}
            className="px-2.5 py-1.5 rounded-lg border border-slate-200 text-sm text-slate-600">
            {PRIORITIES.map((p) => <option key={p.id} value={p.id}>{p.label}</option>)}
          </select>
        </div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
        {STATUSES.map((st) => {
          const list = data.tasks.filter((t) => t.status === st.id);
          return (
            <div key={st.id} className={`rounded-xl ring-1 ${st.ring} ${st.bg} p-3`}>
              <div className="flex items-center justify-between mb-2 px-1">
                <span className={`text-sm font-semibold ${st.text}`}>{st.label}</span>
                <span className={`text-xs ${st.text}`}>{list.length}</span>
              </div>
              <div className="space-y-2">
                {list.length === 0 && (
                  <p className="text-xs text-slate-400 px-1 py-2">업무 없음</p>
                )}
                {list.map((t) => {
                  const pr = PRIORITIES.find((p) => p.id === t.priority);
                  const overdue = t.due && t.status !== "done" && t.due < todayStr();
                  return (
                    <div key={t.id} className="bg-white rounded-lg p-3 shadow-sm border border-white/0">
                      <div className="flex items-start justify-between gap-2">
                        <p className="text-sm font-medium leading-snug">{t.title}</p>
                        <button onClick={() => removeTask(t.id)} className="text-slate-300 hover:text-rose-500 shrink-0">
                          <Icon name="Trash2" className="w-4 h-4" />
                        </button>
                      </div>
                      <div className="flex items-center flex-wrap gap-2 mt-2">
                        <span className="inline-flex items-center gap-1 text-xs text-slate-500">
                          <span className={`w-1.5 h-1.5 rounded-full ${pr.dot}`} /> {pr.label}
                        </span>
                        <span className="text-xs text-slate-400">· {t.assignee}</span>
                        {t.due && (
                          <span className={`text-xs ${overdue ? "text-rose-500 font-medium" : "text-slate-400"}`}>
                            · {fmtDate(t.due)}{overdue ? " 지남" : ""}
                          </span>
                        )}
                      </div>
                      <div className="flex gap-1 mt-2">
                        <button onClick={() => moveStatus(t, -1)} disabled={t.status === "todo"}
                          className="flex-1 flex items-center justify-center py-1 rounded border border-slate-200 text-slate-400 hover:bg-slate-50 disabled:opacity-30">
                          <Icon name="ChevronLeft" className="w-4 h-4" />
                        </button>
                        <button onClick={() => moveStatus(t, 1)} disabled={t.status === "done"}
                          className="flex-1 flex items-center justify-center py-1 rounded border border-slate-200 text-slate-400 hover:bg-slate-50 disabled:opacity-30">
                          <Icon name="ChevronRight" className="w-4 h-4" />
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---------- 설정 ---------- */
function SettingsView({ data, setWorkStart, addMember: addMemberDb, removeMember: removeMemberDb, setMember }) {
  const { workStart, members } = data.settings;
  const [newMember, setNewMember] = useState("");

  const addMember = () => {
    const n = newMember.trim();
    if (!n || members.includes(n)) return;
    addMemberDb(n);
    setNewMember("");
  };
  const removeMember = (m) => removeMemberDb(m);

  return (
    <div className="space-y-5 max-w-lg">
      <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
        <h3 className="text-sm font-semibold mb-1">기준 출근 시간</h3>
        <p className="text-xs text-slate-400 mb-3">이 시간 이후 출근하면 자동으로 지각 처리됩니다.</p>
        <input type="time" value={workStart} onChange={(e) => setWorkStart(e.target.value)}
          className="px-3 py-2 rounded-lg border border-slate-200 text-sm" />
      </div>

      <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
        <h3 className="text-sm font-semibold mb-1">구성원</h3>
        <p className="text-xs text-slate-400 mb-3">출퇴근·업무 담당자로 쓰일 사람을 추가하세요.</p>
        <div className="flex flex-wrap gap-2 mb-3">
          {members.map((m) => (
            <span key={m} className="inline-flex items-center gap-1.5 pl-3 pr-1.5 py-1 rounded-full bg-slate-100 text-sm">
              {m}
              {members.length > 1 && (
                <button onClick={() => removeMember(m)} className="text-slate-400 hover:text-rose-500">
                  <Icon name="X" className="w-3.5 h-3.5" />
                </button>
              )}
            </span>
          ))}
        </div>
        <div className="flex gap-2">
          <input value={newMember} onChange={(e) => setNewMember(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && addMember()}
            placeholder="이름 입력"
            className="flex-1 px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
          <button onClick={addMember}
            className="flex items-center gap-1.5 px-3 py-2 rounded-lg bg-slate-800 text-white text-sm hover:bg-slate-900">
            <Icon name="UserPlus" className="w-4 h-4" /> 추가
          </button>
        </div>
      </div>

      <p className="text-xs text-slate-400">
        데이터는 Supabase에 저장되어 모든 구성원이 같은 기록을 실시간으로 공유합니다. (기준 출근 시간은 이 브라우저에만 저장됩니다)
      </p>
    </div>
  );
}

root.render(<AttendanceTaskApp />);
